name: Build Pacman Repo

on:
  schedule:
    - cron: '0 20 * * *' # Daily at 20:00 UTC (03:00 WIB)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  # Check for new upstream releases
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}
      old_version: ${{ steps.check.outputs.old_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Check upstream version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch latest release from upstream
          LATEST=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/moeru-ai/airi/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//' | tr '-' '_')

          # Get current version from PKGBUILD
          CURRENT=$(grep '^pkgver=' pkgbuilds/airi-bin/PKGBUILD | cut -d= -f2)

          echo "new_version=${LATEST}" >> $GITHUB_OUTPUT
          echo "old_version=${CURRENT}" >> $GITHUB_OUTPUT

          if [ "${LATEST}" != "${CURRENT}" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "🆕 Update available: ${CURRENT} → ${LATEST}"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "✅ Already up-to-date: ${CURRENT}"
          fi

  # Build and release packages
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install build tools
        run: |
          pacman-key --init
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git curl wget jq binutils github-cli pacman-contrib

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Create builder user
        run: useradd -m builder

      - name: Update PKGBUILD version
        if: needs.check.outputs.new_version != needs.check.outputs.old_version
        env:
          NEW_VER: ${{ needs.check.outputs.new_version }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" pkgbuilds/airi-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" pkgbuilds/airi-bin/PKGBUILD
          echo "PKGBUILD updated to version ${NEW_VER}"

      - name: Update checksums
        run: |
          chown -R builder pkgbuilds/airi-bin
          cd pkgbuilds/airi-bin
          su builder -c "updpkgsums"

      - name: Generate .SRCINFO
        run: |
          cd pkgbuilds/airi-bin
          su builder -c "makepkg --printsrcinfo" > .SRCINFO

      - name: Build package
        run: |
          chown -R builder pkgbuilds/airi-bin
          cd pkgbuilds/airi-bin
          # -d: skip runtime dependency checks (electron40 not needed during build)
          # -s: install missing makedepends automatically
          su builder -c "makepkg -sd --noconfirm --skippgpcheck"

      - name: Build repository database
        run: |
          mkdir -p repo-out
          cp pkgbuilds/airi-bin/*.pkg.tar.zst repo-out/
          cd repo-out
          repo-add airi-repo.db.tar.gz *.pkg.tar.zst

      - name: Commit PKGBUILD changes
        if: needs.check.outputs.new_version != needs.check.outputs.old_version
        env:
          NEW_VER: ${{ needs.check.outputs.new_version }}
        run: |
          git add pkgbuilds/airi-bin/PKGBUILD pkgbuilds/airi-bin/.SRCINFO
          git commit -m "chore(airi-bin): bump to v${NEW_VER}" || echo "No changes to commit"
          git push

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VER: ${{ needs.check.outputs.new_version }}
        run: |
          TAG="latest"

          # Delete existing release to create fresh one with new assets
          gh release delete "${TAG}" --yes 2>/dev/null || true

          # Create new release with all packages
          gh release create "${TAG}" \
            --title "Latest Build (v${NEW_VER})" \
            --notes "🤖 Auto-built • airi-bin v${NEW_VER} • $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest \
            repo-out/*.pkg.tar.zst \
            repo-out/airi-repo.db.tar.gz \
            repo-out/airi-repo.db \
            repo-out/airi-repo.files.tar.gz \
            repo-out/airi-repo.files
